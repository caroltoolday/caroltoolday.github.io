<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carol Toolday — Pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0C;
  --surface: #141416;
  --border: #2A2A2E;
  --border-hover: #3A3A3E;
  --fg: #FAFAFA;
  --fg-secondary: #A0A0A8;
  --fg-tertiary: #6B6B73;
  --accent: #FB923C;
  --accent-subtle: rgba(251, 146, 60, 0.10);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 560px;
  width: 100%;
  padding: 48px 24px;
}

.brand {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.02em;
  color: var(--accent);
  margin-bottom: 32px;
}

h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--fg-secondary);
  font-size: 15px;
  margin-bottom: 40px;
}

.projects {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.project-card {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 24px;
  text-decoration: none;
  color: var(--fg);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.project-card:hover {
  border-color: var(--border-hover);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.project-card h2 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 4px;
}

.project-card p {
  font-size: 13px;
  color: var(--fg-secondary);
}

.project-card .tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: var(--accent-subtle);
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 8px;
}

.footer {
  margin-top: 48px;
  text-align: center;
  color: var(--fg-tertiary);
  font-size: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="brand">caroltoolday</div>
  <h1>Pages</h1>
  <p class="subtitle">Documentos e frameworks publicados.</p>

  <div class="projects">
    <a href="prompt-journal/science-of-selling.html" class="project-card">
      <h2>The Science of Selling</h2>
      <p>Framework de vendas de David Hoffeld aplicado ao Prompt Journal.</p>
      <span class="tag">Prompt Journal</span>
    </a>
  </div>

  <div class="footer">
    &copy; 2026 Carol Toolday
  </div>
</div>
</body>
</html>
